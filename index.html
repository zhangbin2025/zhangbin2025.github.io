<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>围棋智能助手</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }
        .container {
            max-width: 480px;
            margin: 0 auto;
            padding: 15px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            text-align: center;
            padding: 20px 15px 15px;
            color: white;
        }
        h1 { 
            font-size: 1.6em; 
            margin-bottom: 4px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        .subtitle { 
            font-size: 0.85em; 
            opacity: 0.8;
            margin-bottom: 6px;
        }
        .date-display {
            font-size: 0.8em;
            padding: 3px 12px;
            background: rgba(255,255,255,0.15);
            border-radius: 12px;
            display: inline-block;
        }
        .cards {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 10px;
            flex: 1;
            min-height: 0;
        }
        .card {
            background: white;
            border-radius: 12px;
            padding: 30px 20px 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
            display: flex;
            align-items: flex-start;
            gap: 15px;
            flex: 1;
            min-height: 0;
        }
        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.15);
        }
        .card-icon {
            font-size: 2em;
            flex-shrink: 0;
        }
        .card-content {
            flex: 1;
        }
        .card h2 {
            color: #667eea;
            margin-bottom: 4px;
            font-size: 1.1em;
        }
        .card-stats {
            display: flex;
            gap: 8px;
            margin: 8px 0;
            flex-wrap: wrap;
        }
        .stat-tag {
            background: linear-gradient(135deg, #667eea20 0%, #764ba220 100%);
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.85em;
            color: #667eea;
            font-weight: 500;
        }
        .card-actions {
            margin-top: 15px;
        }
        .btn {
            display: inline-block;
            padding: 8px 18px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 15px;
            transition: opacity 0.3s;
            font-size: 0.85em;
            white-space: nowrap;
        }
        .btn:hover { opacity: 0.9; }
        footer {
            text-align: center;
            padding: 12px;
            color: rgba(255,255,255,0.7);
            font-size: 0.75em;
            margin-top: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>围棋智能助手</h1>
            <p class="subtitle">你的专属围棋AI伙伴</p>
            <div class="date-display">最后更新: 2026-04-14</div>
        </header>
        
        <div class="cards">
            <!-- 棋谱卡片 -->
            <div class="card">
                <div class="card-icon">📥</div>
                <div class="card-content">
                    <h2>最新棋谱</h2>
                    <div class="card-stats">
                        <span class="stat-tag">17局</span>
                    </div>
                    <div class="card-actions">
                        <a href="./games/" class="btn">查看</a>
                    </div>
                </div>
            </div>
            
            <!-- 选点题卡片 -->
            <div class="card">
                <div class="card-icon">🎯</div>
                <div class="card-content">
                    <h2>实战选点题</h2>
                    <div class="card-stats">
                        <span class="stat-tag">29题</span>
                    </div>
                    <div class="card-actions">
                        <a href="./quiz/" class="btn">做题</a>
                    </div>
                </div>
            </div>
            
            <!-- 定式卡片 -->
            <div class="card">
                <div class="card-icon">📚</div>
                <div class="card-content">
                    <h2>定式发现</h2>
                    <div class="card-stats">
                        <span class="stat-tag">50个</span>
                    </div>
                    <div class="card-actions">
                        <a href="./joseki/" class="btn">查看</a>
                    </div>
                </div>
            </div>
        </div>
        
        <footer>
            <p>围棋智能助手 &copy; 2026 | AI驱动 · 每日更新 · 精进棋艺</p>
        </footer>
    </div>
    </body>
</html>
