<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>围棋智能助手</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }
        .container {
            max-width: 480px;
            margin: 0 auto;
            padding: 15px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            text-align: center;
            padding: 20px 15px 15px;
            color: white;
        }
        h1 { 
            font-size: 2.5em; 
            margin-bottom: 8px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        .date-display {
            font-size: 0.8em;
            padding: 3px 12px;
            background: rgba(255,255,255,0.15);
            border-radius: 12px;
            display: inline-block;
        }
        .cards {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 10px;
            flex: 1;
            min-height: 0;
        }
        .card {
            background: white;
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
            display: flex;
            flex-direction: column;
        }
        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.15);
        }
        .card-link {
            text-decoration: none;
            color: inherit;
            display: block;
        }
        .card-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }
        .card-icon {
            font-size: 1.8em;
            flex-shrink: 0;
        }
        .card h2 {
            color: #333;
            font-size: 1.3em;
            margin: 0;
            font-weight: 600;
        }
        
        /* 主统计区 */
        .main-stats {
            background: linear-gradient(135deg, #667eea08 0%, #764ba208 100%);
            border-radius: 10px;
            padding: 16px;
            text-align: center;
            margin-bottom: 12px;
        }
        .main-number {
            font-size: 2.4em;
            font-weight: 700;
            color: #667eea;
            line-height: 1;
        }
        .main-label {
            font-size: 0.9em;
            color: #888;
            margin-top: 4px;
        }
        
        /* 分隔线 */
        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, #e0e0e0, transparent);
            margin: 12px 0;
        }
        
        /* 分类标签区 */
        .categories {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
        }
        .tag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 5px 10px;
            border-radius: 8px;
            font-size: 0.8em;
            font-weight: 500;
        }
        .tag-blue { background: #e3f2fd; color: #1565c0; }
        .tag-green { background: #e8f5e9; color: #2e7d32; }
        .tag-orange { background: #fff3e0; color: #e65100; }
        .tag-purple { background: #f3e5f5; color: #7b1fa2; }
        .tag-red { background: #ffebee; color: #c62828; }
        
        /* 按钮 */
        .card-actions {
            margin-top: 12px;
            text-align: center;
        }
        .btn {
            display: inline-block;
            padding: 10px 28px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 20px;
            transition: opacity 0.3s;
            font-size: 0.95em;
            font-weight: 500;
        }
        .btn:hover { opacity: 0.9; }
        
        footer {
            text-align: center;
            padding: 12px;
            color: rgba(255,255,255,0.7);
            font-size: 0.75em;
            margin-top: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>围棋智能助手</h1>
            <div class="date-display">最后更新: 2026-04-15</div>
        </header>
        
        <div class="cards">
            <!-- 棋谱卡片 -->
            <a href="./games/" class="card-link">
                <div class="card">
                    <div class="card-header">
                        <div class="card-icon">📥</div>
                        <h2>最新棋谱</h2>
                    </div>
                    <div class="main-stats">
                        <div class="main-number">18局</div>
                        <div class="main-label">今日新谱</div>
                    </div>
                    <div class="categories">
                        <span class="tag tag-purple">3个赛事</span>
                    </div>
                    <div class="card-actions">
                        <span class="btn">查看棋谱</span>
                    </div>
                </div>
            </a>
            
            <!-- 选点题卡片 -->
            <a href="./quiz/" class="card-link">
                <div class="card">
                    <div class="card-header">
                        <div class="card-icon">🎯</div>
                        <h2>实战选点</h2>
                    </div>
                    <div class="main-stats">
                        <div class="main-number">31题</div>
                        <div class="main-label">恶手练习题</div>
                    </div>
                    <div class="divider"></div>
                    <div class="categories">
                        <span class="tag tag-blue">布局5</span>
                        <span class="tag tag-green">中盘16</span>
                        <span class="tag tag-orange">官子10</span>
                    </div>
                    <div class="categories" style="margin-top:8px;">
                        <span class="tag tag-blue">简17</span>
                        <span class="tag tag-green">中12</span>
                        <span class="tag tag-orange">难2</span>
                    </div>
                    <div class="card-actions">
                        <span class="btn">开始做题</span>
                    </div>
                </div>
            </a>
            
            <!-- 定式卡片 -->
            <a href="./joseki/" class="card-link">
                <div class="card">
                    <div class="card-header">
                        <div class="card-icon">📚</div>
                        <h2>定式发现</h2>
                    </div>
                    <div class="main-stats">
                        <div class="main-number">69个</div>
                        <div class="main-label">值得研究的定式</div>
                    </div>
                    <div class="divider"></div>
                    <div class="categories">
                        <span class="tag tag-red">🔥 热门 1</span>
                        <span class="tag tag-green">🎯 命中 5</span>
                        <span class="tag tag-blue">💎 罕见 4</span>
                    </div>
                    <div class="card-actions">
                        <span class="btn">查看定式</span>
                    </div>
                </div>
            </a>
        </div>
        
        <footer>
            <p>围棋智能助手 &copy; 2026 | AI驱动 · 每日更新 · 精进棋艺</p>
        </footer>
    </div>
    </body>
</html>
