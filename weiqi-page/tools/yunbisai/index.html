<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>云比赛 - 围棋智能助手</title>
    <link rel="icon" type="image/x-icon" href="/weiqi-page/assets/favicon/favicon.ico">
    <script>document.write('<script src="/weiqi-page/assets/js/auth.js?v=' + Date.now() + '"><\/script>');</script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f5; min-height: 100vh; color: #333; }
        .container { max-width: 480px; margin: 0 auto; padding: 12px; min-height: 100vh; }
        header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 12px 15px; margin-bottom: 12px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
        h1 { font-size: 1.3em; margin: 0; }
        .header-left { display: flex; align-items: center; gap: 10px; }
        .header-actions { display: flex; gap: 10px; align-items: center; }
        .icon-btn { background: rgba(255,255,255,0.2); border: none; color: white; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-size: 1em; }
        .icon-btn:hover { background: rgba(255,255,255,0.3); }
        .card { background: white; border-radius: 12px; padding: 16px; margin-bottom: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .card h2 { font-size: 1.1em; margin-bottom: 12px; color: #333; }
        .visited-tag { background: #e3f2fd; color: #1976d2; border: none; padding: 6px 12px; border-radius: 16px; font-size: 0.85em; cursor: pointer; text-align: left !important; display: inline-flex; justify-content: flex-start; align-items: center; }
        .visited-tag:hover { background: #bbdefb; }
        input, select { width: 100%; padding: 12px 16px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 16px; margin-bottom: 12px; }
        input:focus, select:focus { outline: none; border-color: #667eea; }
        button { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; padding: 12px 24px; border-radius: 8px; font-size: 16px; cursor: pointer; width: 100%; }
        button:hover { opacity: 0.9; }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        .loading { text-align: center; padding: 40px 20px; }
        .spinner { border: 3px solid #f3f3f3; border-top: 3px solid #667eea; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 16px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        footer { text-align: center; padding: 20px; color: #999; font-size: 0.8em; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🏆 云比赛</h1>
        </header>
        
        <div id="recentVisited" style="margin-bottom: 12px;"></div>
        
        <div class="card">
            <h2>🔍 查询比赛</h2>
            <select id="areaSelect">
                <option value="">全国</option>
                <option value="广东省" selected>广东省</option>
                <option value="北京市">北京市</option>
                <option value="上海市">上海市</option>
                <option value="浙江省">浙江省</option>
                <option value="江苏省">江苏省</option>
            </select>
            <select id="monthSelect">
                <option value="3">最近3个月</option>
                <option value="1" selected>最近1个月</option>
                <option value="6">最近半年</option>
                <option value="12">最近1年</option>
            </select>
            <input type="text" id="keywordInput" placeholder="关键词（可选）">
            <button onclick="queryEvents()" id="queryBtn">开始查询</button>
        </div>
        
        <footer><p>围棋智能助手 &copy; 2026</p></footer>
    </div>
    
    <script>
        async function queryEvents() {
            const area = document.getElementById('areaSelect').value;
            const month = document.getElementById('monthSelect').value;
            const keyword = document.getElementById('keywordInput').value.trim();
            
            if (!hasToken()) { redirectToAuth(); return; }
            
            document.getElementById('queryBtn').disabled = true;
            document.getElementById('queryBtn').textContent = '查询中...';
            
            try {
                let url = `/api/v1/yunbisai/events?month=${month}`;
                if (area) url += `&area=${encodeURIComponent(area)}`;
                if (keyword) url += `&keyword=${encodeURIComponent(keyword)}`;
                
                const response = await fetchWithAuth(url);
                if (!response) return;
                const data = await response.json();
                
                if (!data.success) throw new Error(data.error?.message || '查询失败');
                
                // 保存查询条件并跳转到比赛列表页
                const query = { area, month, keyword, data: data.data };
                sessionStorage.setItem('yunbisai_query', JSON.stringify(query));
                
                location.href = 'events.html';
                
            } catch (error) {
                alert('查询失败: ' + error.message);
            } finally {
                document.getElementById('queryBtn').disabled = false;
                document.getElementById('queryBtn').textContent = '开始查询';
            }
        }
        
        document.getElementById('keywordInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') queryEvents();
        });
        
        // 加载最近访问的比赛
        function loadRecentVisited() {
            try {
                const visited = JSON.parse(localStorage.getItem('yunbisai_visited') || '[]');
                const container = document.getElementById('recentVisited');
                if (visited.length === 0) {
                    container.innerHTML = '';
                    return;
                }
                let html = '<div class="card" style="text-align:left !important;"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;"><h2 style="text-align:left !important;margin:0;">📌 最近访问</h2><button onclick="event.stopPropagation();clearVisited()" style="width:auto;padding:4px 12px;font-size:0.8em;background:#f5f5f5;color:#666;border:none;border-radius:4px;cursor:pointer;">清除</button></div><div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-start;">'; 
                visited.forEach(e => {
                    html += `<button class="visited-tag" style="text-align:left !important;justify-content:flex-start;" onclick="quickVisit(${e.id}, '${e.title.replace(/'/g, "\\'")}')">${e.title}</button>`;
                });
                html += '</div></div>';
                container.innerHTML = html;
            } catch (e) {}
        }
        
        function quickVisit(eventId, eventTitle) {
            sessionStorage.setItem('yunbisai_event', JSON.stringify({ id: eventId, title: eventTitle }));
            location.href = 'detail.html';
        }
        
        function clearVisited() {
            localStorage.removeItem('yunbisai_visited');
            document.getElementById('recentVisited').innerHTML = '';
        }
        
        function recordVisited(event) {
            if (!event) return;
            try {
                let visited = JSON.parse(localStorage.getItem('yunbisai_visited') || '[]');
                visited = visited.filter(e => e.id !== event.id);
                visited.unshift({ id: event.id, title: event.title, time: new Date().toISOString() });
                visited = visited.slice(0, 5);
                localStorage.setItem('yunbisai_visited', JSON.stringify(visited));
            } catch (e) {}
        }
        
        loadRecentVisited();
    </script>
</body>
</html>
