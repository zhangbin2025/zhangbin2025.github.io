<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>围棋记谱</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 0;
            touch-action: manipulation;
        }
        .container {
            background: white;
            border-radius: 0;
            box-shadow: none;
            padding: 4px;
            max-width: 100%;
            width: 100%;
            min-height: 100vh;
        }
        .header {
            text-align: center;
            margin-bottom: 8px;
        }
        .header h1 {
            font-size: 15px;
            color: #333;
            margin-bottom: 2px;
            line-height: 1.2;
        }
        .stone-indicator {
            width: 20px;
            height: 20px;
            border-radius: 50%;
        }
        .stone-indicator.black {
            background: radial-gradient(circle at 30% 30%, #666, #000);
        }
        .stone-indicator.white {
            background: radial-gradient(circle at 30% 30%, #fff, #ccc);
            border: 1px solid #ddd;
        }
        .board-container {
            display: flex;
            justify-content: center;
            margin: 10px 0;
            position: relative;
            width: 100%;
        }
        #board {
            background: #E3C16F;
            border-radius: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            max-width: 100%;
            width: 100%;
            height: auto;
            aspect-ratio: 1 / 1;
            display: block;
            touch-action: none;
        }
        .toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            margin: 12px 0;
            padding: 0 10px;
        }
        .btn-group {
            display: flex;
            gap: 16px;
        }
        .btn {
            width: 44px;
            height: 44px;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            background: #f0f0f0;
            color: #333;
        }
        .btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        .btn:active:not(:disabled) {
            transform: scale(0.95);
        }
        .btn-danger {
            background: #ff6b6b;
            color: white;
        }
        .btn-sm {
            width: 40px;
            height: 40px;
            font-size: 16px;
        }
        .move-display {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 16px;
            color: #333;
        }
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.75);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 1000;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .toast.show {
            opacity: 1;
        }
        /* 二维码弹窗样式 */
        .qr-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        .qr-modal.show {
            display: flex;
        }
        .qr-container {
            background: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            max-width: 280px;
            width: 90%;
        }
        .qr-title {
            font-size: 16px;
            color: #333;
            margin-bottom: 15px;
        }
        .qr-hint {
            font-size: 13px;
            color: #666;
            margin-top: 15px;
            line-height: 1.5;
        }
        .qr-close {
            margin-top: 15px;
            padding: 10px 30px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
        }
        @media (min-width: 600px) {
            body { padding: 8px; }
            .container { max-width: 500px; padding: 20px; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.3); min-height: auto; }
            .header h1 { font-size: 20px; }
        }
        @media (min-width: 900px) {
            .container { max-width: 700px; padding: 30px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>围棋记谱</h1>
        </div>
        
        <div class="board-container">
            <canvas id="board"></canvas>
        </div>
        
        <div class="toolbar">
            <div class="btn-group">
                <button class="btn btn-sm" onclick="undoMove()" title="悔棋">↩️</button>
                <button class="btn btn-sm" onclick="passMove()" title="停一手">🙅</button>
                <button class="btn btn-sm" onclick="clearBoard()" title="新建棋谱">📝</button>
                <button id="exportBtn" class="btn btn-sm" onclick="exportSGF()" title="导出SGF">📤</button>
                <button class="btn btn-sm" onclick="copySGF()" title="复制SGF到剪贴板">📄</button>
            </div>
            <div class="move-display">
                <div id="player-indicator" class="stone-indicator black"></div>
                <span id="move-num">0</span>手
            </div>
        </div>
    </div>
    
    <div id="toast" class="toast"></div>

    <!-- 二维码弹窗 -->
    <div id="qrModal" class="qr-modal">
        <div class="qr-container">
            <div class="qr-title">扫码下载棋谱</div>
            <div id="qrcode"></div>
            <div class="qr-hint">截图或长按二维码<br>识别后即可下载SGF文件</div>
            <button class="qr-close" onclick="closeQRCode()">关闭</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('board');
        const ctx = canvas.getContext('2d');
        const BOARD_SIZE = 19;
        
        // 检测微信浏览器
        function isWechatBrowser() {
            return /MicroMessenger/i.test(navigator.userAgent);
        }

        // 动态加载 qrcode.js
        let qrcodeLibLoaded = false;
        function loadQRCodeLib() {
            if (qrcodeLibLoaded) return;
            const script = document.createElement('script');
            script.src = 'https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js';
            script.onload = function() {
                qrcodeLibLoaded = true;
                console.log('QRCode library loaded');
            };
            script.onerror = function() {
                showStatus('二维码库加载失败，请检查网络');
            };
            document.head.appendChild(script);
        }

        // 紧凑格式编码：文件头4字节 + 每手2字节
        function encodeCompact() {
            const moves = gameState.filter(m => !m.isPass);
            if (moves.length === 0) return null;

            // 文件头: Magic(1) + Version(1) + BoardSize(1) + Handicap(1)
            const header = new Uint8Array([0x57, 0x01, 0x13, 0x00]);

            // 手数数据: 每手2字节 (Color 1bit + X 7bit, Y 8bit)
            const data = new Uint8Array(moves.length * 2);
            for (let i = 0; i < moves.length; i++) {
                const m = moves[i];
                const color = m.player === 'W' ? 1 : 0;  // 1=白, 0=黑
                data[i * 2] = (color << 7) | (m.col & 0x7F);  // 颜色放最高位，X坐标
                data[i * 2 + 1] = m.row & 0xFF;  // Y坐标
            }

            // 合并
            const compact = new Uint8Array(header.length + data.length);
            compact.set(header);
            compact.set(data, header.length);

            // Base64编码 (URL safe)
            const base64 = btoa(String.fromCharCode(...compact))
                .replace(/\+/g, '-')
                .replace(/\//g, '_')
                .replace(/=/g, '');
            return base64;
        }

        // 解码页面地址配置（可自定义）
        const QR_DECODE_URL = 'https://weiqi-dev.github.io/sgf-decode/';

        // 显示二维码弹窗
        function showQRCode() {
            if (!qrcodeLibLoaded) {
                showStatus('二维码库加载中，请稍候');
                return;
            }

            const base64 = encodeCompact();
            if (!base64) {
                showStatus('棋盘为空');
                return;
            }

            const url = QR_DECODE_URL + '?d=' + base64;
            const qrContainer = document.getElementById('qrcode');
            qrContainer.innerHTML = '';

            // 使用 QRCode.js 生成二维码
            new QRCode(qrContainer, {
                text: url,
                width: 200,
                height: 200,
                colorDark: '#000000',
                colorLight: '#ffffff',
                correctLevel: QRCode.CorrectLevel.M
            });

            // 将 canvas 转换为 img，支持微信长按识别
            setTimeout(function() {
                const canvas = qrContainer.querySelector('canvas');
                if (canvas) {
                    const img = document.createElement('img');
                    img.src = canvas.toDataURL('image/png');
                    img.style.width = '200px';
                    img.style.height = '200px';
                    qrContainer.innerHTML = '';
                    qrContainer.appendChild(img);
                }
            }, 100);

            document.getElementById('qrModal').classList.add('show');
        }

        // 关闭二维码弹窗
        function closeQRCode() {
            document.getElementById('qrModal').classList.remove('show');
            document.getElementById('qrcode').innerHTML = '';
        }

        // 点击弹窗背景关闭
        document.getElementById('qrModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeQRCode();
            }
        });

        // 微信浏览器下加载二维码功能（在函数定义之后执行）
        if (isWechatBrowser()) {
            const exportBtn = document.getElementById('exportBtn');
            if (exportBtn) {
                exportBtn.innerHTML = '📱';
                exportBtn.title = '分享二维码';
                exportBtn.removeAttribute('onclick');
                exportBtn.onclick = showQRCode;
            }
            // 延迟加载 qrcode.js，确保页面功能先初始化
            setTimeout(function() {
                loadQRCodeLib();
            }, 100);
        }

        function getBoardSize() {
            const maxWidth = Math.min(window.innerWidth - 20, 600);
            const maxHeight = window.innerHeight - 180;
            return Math.min(maxWidth, maxHeight, 570);
        }
        
        let boardSize = getBoardSize();
        let MARGIN, GRID_SIZE;
        
        function updateDimensions() {
            boardSize = getBoardSize();
            // 让线铺满，边距只留一点
            MARGIN = boardSize * 0.04;
            GRID_SIZE = (boardSize - 2 * MARGIN) / (BOARD_SIZE - 1);
            
            canvas.width = boardSize;
            canvas.height = boardSize;
            canvas.style.width = boardSize + 'px';
            canvas.style.height = boardSize + 'px';
        }
        
        let gameState = [];
        let currentPlayer = 'B';
        let capturedStones = new Set(); // 记录被提的棋子坐标 "col,row"
        let koPosition = null; // 打劫位 {col, row}，禁止对方立即提回
        
        // 音效系统 - 使用噪声合成更真实的围棋音效
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function createNoiseBuffer() {
            const bufferSize = audioCtx.sampleRate * 0.1;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                data[i] = Math.random() * 2 - 1;
            }
            return buffer;
        }
        
        let noiseBuffer = null;
        
        function playSound(type) {
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            
            if (!noiseBuffer) {
                noiseBuffer = createNoiseBuffer();
            }
            
            if (type === 'place') {
                // 落子音：木石碰撞声
                const noise = audioCtx.createBufferSource();
                noise.buffer = noiseBuffer;
                
                const filter = audioCtx.createBiquadFilter();
                filter.type = 'bandpass';
                filter.frequency.value = 2500;
                filter.Q.value = 1;
                
                const gain = audioCtx.createGain();
                gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.06);
                
                noise.connect(filter);
                filter.connect(gain);
                gain.connect(audioCtx.destination);
                
                noise.start(audioCtx.currentTime);
                noise.stop(audioCtx.currentTime + 0.06);
                
                // 添加谐波增强木质感
                const osc = audioCtx.createOscillator();
                osc.type = 'triangle';
                osc.frequency.value = 400;
                
                const oscGain = audioCtx.createGain();
                oscGain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                oscGain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
                
                osc.connect(oscGain);
                oscGain.connect(audioCtx.destination);
                osc.start(audioCtx.currentTime);
                osc.stop(audioCtx.currentTime + 0.05);
                
            } else if (type === 'capture') {
                // 吃子音：提子声（更低沉、稍长）
                const noise = audioCtx.createBufferSource();
                noise.buffer = noiseBuffer;
                
                const filter = audioCtx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 1200;
                filter.frequency.linearRampToValueAtTime(600, audioCtx.currentTime + 0.15);
                
                const gain = audioCtx.createGain();
                gain.gain.setValueAtTime(0.6, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.18);
                
                noise.connect(filter);
                filter.connect(gain);
                gain.connect(audioCtx.destination);
                
                noise.start(audioCtx.currentTime);
                noise.stop(audioCtx.currentTime + 0.18);
                
                // 添加一些随机微响声模拟石子散落
                for (let i = 0; i < 3; i++) {
                    setTimeout(() => {
                        if (audioCtx.state === 'running') {
                            const microNoise = audioCtx.createBufferSource();
                            microNoise.buffer = noiseBuffer;
                            const microFilter = audioCtx.createBiquadFilter();
                            microFilter.type = 'highpass';
                            microFilter.frequency.value = 3000;
                            const microGain = audioCtx.createGain();
                            microGain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                            microGain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.03);
                            microNoise.connect(microFilter);
                            microFilter.connect(microGain);
                            microGain.connect(audioCtx.destination);
                            microNoise.start(audioCtx.currentTime);
                            microNoise.stop(audioCtx.currentTime + 0.03);
                        }
                    }, 50 + i * 30);
                }
                
            } else if (type === 'pass') {
                // 停一手：轻柔提示音（比原来稍明显一点）
                const osc = audioCtx.createOscillator();
                osc.type = 'sine';
                osc.frequency.value = 523.25; // C5
                
                const gain = audioCtx.createGain();
                gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(audioCtx.currentTime);
                osc.stop(audioCtx.currentTime + 0.1);
                
            } else if (type === 'undo') {
                // 悔棋音效：短促的"啵"声
                const osc = audioCtx.createOscillator();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + 0.08);
                
                const gain = audioCtx.createGain();
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.08);
                
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(audioCtx.currentTime);
                osc.stop(audioCtx.currentTime + 0.08);
                
            } else if (type === 'clear') {
                // 清空音效：棋子哗啦啦掉落
                // 使用多个高频噪声模拟石子散落
                for (let i = 0; i < 8; i++) {
                    setTimeout(() => {
                        if (audioCtx.state === 'running') {
                            const noise = audioCtx.createBufferSource();
                            noise.buffer = noiseBuffer;
                            
                            const filter = audioCtx.createBiquadFilter();
                            filter.type = 'highpass';
                            filter.frequency.value = 2000 + Math.random() * 2000;
                            
                            const gain = audioCtx.createGain();
                            gain.gain.setValueAtTime(0.15 + Math.random() * 0.1, audioCtx.currentTime);
                            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05 + Math.random() * 0.05);
                            
                            noise.connect(filter);
                            filter.connect(gain);
                            gain.connect(audioCtx.destination);
                            noise.start(audioCtx.currentTime);
                            noise.stop(audioCtx.currentTime + 0.1);
                        }
                    }, i * 40);
                }
                
                // 添加低频底音模拟一堆棋子掉落
                const baseOsc = audioCtx.createOscillator();
                baseOsc.type = 'triangle';
                baseOsc.frequency.setValueAtTime(150, audioCtx.currentTime);
                baseOsc.frequency.linearRampToValueAtTime(80, audioCtx.currentTime + 0.4);
                
                const baseGain = audioCtx.createGain();
                baseGain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                baseGain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
                
                baseOsc.connect(baseGain);
                baseGain.connect(audioCtx.destination);
                baseOsc.start(audioCtx.currentTime);
                baseOsc.stop(audioCtx.currentTime + 0.4);
            }
        }
        
        // 获取某位置的棋子（只返回未被提的，从后往前找最新的）
        function getStone(col, row) {
            if (capturedStones.has(`${col},${row}`)) return null;
            for (let i = gameState.length - 1; i >= 0; i--) {
                const m = gameState[i];
                if (!m.isPass && m.col === col && m.row === row) {
                    return m;
                }
            }
            return null;
        }
        
        // 计算一个棋子群的 liberties（气）
        function countLiberties(group) {
            const liberties = new Set();
            const directions = [[0, 1], [0, -1], [1, 0], [-1, 0]];

            for (const stone of group) {
                for (const [dx, dy] of directions) {
                    const nc = stone.col + dx;
                    const nr = stone.row + dy;
                    if (nc >= 0 && nc < BOARD_SIZE && nr >= 0 && nr < BOARD_SIZE) {
                        // 检查该位置是否有有效棋子（考虑capturedStones，被提的位置是空的）
                        if (!getStone(nc, nr)) {
                            liberties.add(`${nc},${nr}`);
                        }
                    }
                }
            }
            return liberties.size;
        }
        
        // 找到一个棋子群（连通块）
        function findGroup(startCol, startRow, player) {
            const group = [];
            const visited = new Set();
            const stack = [{col: startCol, row: startRow}];

            while (stack.length > 0) {
                const {col, row} = stack.pop();
                const key = `${col},${row}`;

                if (visited.has(key)) continue;
                visited.add(key);

                const stone = getStone(col, row);
                if (stone && stone.player === player) {
                    group.push(stone);

                    const directions = [[0, 1], [0, -1], [1, 0], [-1, 0]];
                    for (const [dx, dy] of directions) {
                        const nc = col + dx;
                        const nr = row + dy;
                        if (nc >= 0 && nc < BOARD_SIZE && nr >= 0 && nr < BOARD_SIZE) {
                            stack.push({col: nc, row: nr});
                        }
                    }
                }
            }

            return group;
        }
        
        // 执行吃子，标记被吃的棋子，返回被吃坐标列表
        function removeDeadStones(opponent) {
            const toRemove = [];
            const visited = new Set();
            
            for (const move of gameState) {
                if (move.isPass || move.player !== opponent) continue;
                if (capturedStones.has(`${move.col},${move.row}`)) continue;
                const key = `${move.col},${move.row}`;
                if (visited.has(key)) continue;
                
                const group = findGroup(move.col, move.row, opponent);
                for (const s of group) {
                    visited.add(`${s.col},${s.row}`);
                }
                
                if (countLiberties(group) === 0) {
                    toRemove.push(...group);
                }
            }
            
            // 标记被吃的棋子（不移除记录，只标记为已提）
            for (const stone of toRemove) {
                capturedStones.add(`${stone.col},${stone.row}`);
            }
            
            return toRemove.map(s => ({col: s.col, row: s.row}));
        }
        
        // 检查是否是自杀（禁入点）
        function isSuicide(col, row, player) {
            const opponent = player === 'B' ? 'W' : 'B';
            const directions = [[0, 1], [0, -1], [1, 0], [-1, 0]];
            const posKey = `${col},${row}`;

            // 临时从 capturedStones 移除该坐标（如果有）
            const wasCaptured = capturedStones.has(posKey);
            if (wasCaptured) capturedStones.delete(posKey);

            // 临时添加棋子
            const tempStone = {col, row, player, moveNum: 0, isPass: false};
            gameState.push(tempStone);

            // 先检查是否能提对方棋子
            let canCapture = false;
            const checked = new Set();
            
            for (const [dx, dy] of directions) {
                const nc = col + dx;
                const nr = row + dy;
                const neighbor = getStone(nc, nr);
                if (neighbor && neighbor.player === opponent) {
                    const key = `${nc},${nr}`;
                    if (!checked.has(key)) {
                        const group = findGroup(nc, nr, opponent);
                        for (const s of group) {
                            checked.add(`${s.col},${s.row}`);
                        }
                        if (countLiberties(group) === 0) {
                            canCapture = true;
                        }
                    }
                }
            }

            // 检查自己是否还有气
            const myGroup = findGroup(col, row, player);
            const myLiberties = countLiberties(myGroup);

            // 恢复状态
            gameState.pop();
            if (wasCaptured) capturedStones.add(posKey);

            // 如果没气且不能提子，则是禁入点
            return myLiberties === 0 && !canCapture;
        }
        
        function init() {
            updateDimensions();
            drawBoard();
            loadGame();
            
            window.addEventListener('resize', function() {
                updateDimensions();
                drawStones();
            });
        }
        
        function drawBoard() {
            ctx.fillStyle = '#E3C16F';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.strokeStyle = '#666';
            ctx.lineWidth = 1;
            
            for (let i = 0; i < BOARD_SIZE; i++) {
                const pos = MARGIN + i * GRID_SIZE;
                
                ctx.beginPath();
                ctx.moveTo(MARGIN, pos);
                ctx.lineTo(MARGIN + (BOARD_SIZE - 1) * GRID_SIZE, pos);
                ctx.stroke();
                
                ctx.beginPath();
                ctx.moveTo(pos, MARGIN);
                ctx.lineTo(pos, MARGIN + (BOARD_SIZE - 1) * GRID_SIZE);
                ctx.stroke();
            }
            
            // 星位
            const stars = [3, 9, 15];
            ctx.fillStyle = '#333';
            for (let r of stars) {
                for (let c of stars) {
                    const x = MARGIN + c * GRID_SIZE;
                    const y = MARGIN + r * GRID_SIZE;
                    ctx.beginPath();
                    ctx.arc(x, y, 3, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }
        
        function drawStones() {
            drawBoard();
            
            // 绘制当前在棋盘上的有效棋子（未被提的）
            const activeMoves = gameState.filter((m, idx) => {
                if (m.isPass) return false;
                return !capturedStones.has(`${m.col},${m.row}`);
            });
            
            for (let i = 0; i < activeMoves.length; i++) {
                const move = activeMoves[i];
                const x = MARGIN + move.col * GRID_SIZE;
                const y = MARGIN + move.row * GRID_SIZE;
                const radius = GRID_SIZE * 0.46;
                
                if (move.player === 'B') {
                    const gradient = ctx.createRadialGradient(
                        x - radius * 0.3, y - radius * 0.3, radius * 0.1,
                        x, y, radius
                    );
                    gradient.addColorStop(0, '#666');
                    gradient.addColorStop(1, '#000');
                    ctx.fillStyle = gradient;
                    ctx.beginPath();
                    ctx.arc(x, y, radius, 0, Math.PI * 2);
                    ctx.fill();
                } else {
                    const gradient = ctx.createRadialGradient(
                        x - radius * 0.3, y - radius * 0.3, radius * 0.1,
                        x, y, radius
                    );
                    gradient.addColorStop(0, '#fff');
                    gradient.addColorStop(1, '#ccc');
                    ctx.fillStyle = gradient;
                    ctx.beginPath();
                    ctx.arc(x, y, radius, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = '#bbb';
                    ctx.lineWidth = 1;
                    ctx.stroke();
                }
            }
            
            // 最后一手标记
            const lastMove = gameState[gameState.length - 1];
            if (lastMove && !lastMove.isPass && !capturedStones.has(`${lastMove.col},${lastMove.row}`)) {
                const x = MARGIN + lastMove.col * GRID_SIZE;
                const y = MARGIN + lastMove.row * GRID_SIZE;
                ctx.fillStyle = lastMove.player === 'B' ? '#fff' : '#f00';
                ctx.beginPath();
                ctx.arc(x, y, 2, 0, Math.PI * 2);
                ctx.fill();
            }
        }
        
        function getBoardPos(clientX, clientY) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const x = (clientX - rect.left) * scaleX;
            const y = (clientY - rect.top) * scaleY;
            
            const col = Math.round((x - MARGIN) / GRID_SIZE);
            const row = Math.round((y - MARGIN) / GRID_SIZE);
            
            if (col >= 0 && col < BOARD_SIZE && row >= 0 && row < BOARD_SIZE) {
                return { col, row };
            }
            return null;
        }
        
        function placeStone(e) {
            e.preventDefault();
            const clientX = e.clientX || (e.touches && e.touches[0].clientX);
            const clientY = e.clientY || (e.touches && e.touches[0].clientY);
            
            if (!clientX || !clientY) return;
            
            const pos = getBoardPos(clientX, clientY);
            if (!pos) return;
            
            // 用 getStone 检查当前该位置是否有有效棋子（没被提的）
            if (getStone(pos.col, pos.row)) {
                showStatus('该位置已有棋子');
                return;
            }
            
            // 检查是否自杀
            if (isSuicide(pos.col, pos.row, currentPlayer)) {
                showStatus('禁入点');
                return;
            }
            
            // 检查是否违反打劫规则
            if (koPosition && parseInt(koPosition.col) === parseInt(pos.col) && parseInt(koPosition.row) === parseInt(pos.row)) {
                showStatus('打劫');
                return;
            }
            
            // 如果该位置之前被提过，从 capturedStones 移除
            capturedStones.delete(`${pos.col},${pos.row}`);

            // 落子
            gameState.push({
                col: pos.col,
                row: pos.row,
                player: currentPlayer,
                moveNum: gameState.length + 1,
                isPass: false
            });

            // 执行吃子（提对方没气的棋子）
            const opponent = currentPlayer === 'B' ? 'W' : 'B';
            const capturedCoords = removeDeadStones(opponent);

            // 如果刚落的子自己被提（应该发生在自杀规则没拦住时），移除它
            if (capturedStones.has(`${pos.col},${pos.row}`)) {
                // 这个子被提了，从 gameState 移除
                gameState.pop();
                showStatus('此落子导致己方被提，已撤销');
                drawStones();
                saveGame();
                return;
            }

            // 判断打劫：只提了一个子，且对方能立即提回来，才形成打劫
            if (capturedCoords.length === 1) {
                const capturedPos = capturedCoords[0];
                // 检查是否形成打劫：只提一个子，且对方能提回来，且对方提回来的也是一颗子
                const opponent = currentPlayer === 'B' ? 'W' : 'B';
                const oppCol = capturedPos.col;
                const oppRow = capturedPos.row;
                
                // 检查对方能否提回来（对方落子后，当前子是否没气）
                const tempKey = `${oppCol},${oppRow}`;
                const wasCaptured = capturedStones.has(tempKey);
                if (wasCaptured) capturedStones.delete(tempKey);
                
                // 临时添加对方的子
                const tempOppStone = {col: oppCol, row: oppRow, player: opponent, moveNum: 0, isPass: false};
                gameState.push(tempOppStone);
                
                // 检查当前子是否没气了（能被对方提）
                const myGroup = findGroup(pos.col, pos.row, currentPlayer);
                const myLiberties = countLiberties(myGroup);
                const canBeCaptured = myLiberties === 0;
                
                // 检查对方提回来的子数是否也是一颗
                let capturesOneStone = false;
                if (canBeCaptured) {
                    capturesOneStone = myGroup.length === 1;
                }
                
                // 恢复临时状态
                gameState.pop();
                if (wasCaptured) capturedStones.add(tempKey);
                
                // 形成打劫的条件：只提一个子，且对方能提回来，且对方提回来的也是一颗子
                if (canBeCaptured && capturesOneStone) {
                    koPosition = {col: parseInt(capturedPos.col), row: parseInt(capturedPos.row)};
                } else {
                    koPosition = null;
                }
            } else {
                // 多子提或没提子，清除打劫
                koPosition = null;
            }
            
            // 播放音效
            playSound(capturedCoords.length > 0 ? 'capture' : 'place');
            
            currentPlayer = currentPlayer === 'B' ? 'W' : 'B';
            updateUI();
            drawStones();
            saveGame();
        }
        
        function passMove() {
            gameState.push({
                player: currentPlayer,
                moveNum: gameState.length + 1,
                isPass: true
            });
            
            // 停一手清除打劫
            koPosition = null;
            
            playSound('pass');
            
            currentPlayer = currentPlayer === 'B' ? 'W' : 'B';
            updateUI();
            saveGame();

            const playerName = gameState[gameState.length - 1].player === 'B' ? '黑' : '白';
            showStatus(`${playerName}方停一手`);
        }
        
        // 重新计算所有被提的棋子（悔棋后需要重新计算）
        function recaptureStones() {
            capturedStones.clear();
            // 从头开始模拟，标记所有被提的棋子
            const tempCaptured = new Set();
            const tempGameState = [];
            
            for (const move of gameState) {
                if (move.isPass) {
                    tempGameState.push(move);
                    continue;
                }
                
                // 如果该位置之前被提过，移除标记（新棋子占据）
                tempCaptured.delete(`${move.col},${move.row}`);
                
                tempGameState.push(move);
                
                // 检查是否能吃对方（需要检查全盘，不能只检查邻接）
                const opponent = move.player === 'B' ? 'W' : 'B';
                const visited = new Set();
                
                for (const m of tempGameState) {
                    if (m.isPass || m.player !== opponent) continue;
                    if (tempCaptured.has(`${m.col},${m.row}`)) continue;
                    const key = `${m.col},${m.row}`;
                    if (visited.has(key)) continue;
                    
                    const group = findGroupInTemp(m.col, m.row, opponent, tempGameState, tempCaptured);
                    for (const s of group) visited.add(`${s.col},${s.row}`);
                    
                    if (countLibertiesInTemp(group, tempGameState, tempCaptured) === 0) {
                        for (const s of group) tempCaptured.add(`${s.col},${s.row}`);
                    }
                }
            }
            
            // 合并到正式的capturedStones
            for (const key of tempCaptured) {
                capturedStones.add(key);
            }
        }
        
        // 在临时状态中找到连通块
        function findGroupInTemp(startCol, startRow, player, tempState, tempCaptured) {
            const group = [];
            const visited = new Set();
            const stack = [{col: startCol, row: startRow}];
            
            while (stack.length > 0) {
                const {col, row} = stack.pop();
                const key = `${col},${row}`;
                
                if (visited.has(key)) continue;
                visited.add(key);
                
                // 从后往前找最新的棋子
                let stone = null;
                for (let i = tempState.length - 1; i >= 0; i--) {
                    const m = tempState[i];
                    if (!m.isPass && m.col === col && m.row === row && !tempCaptured.has(key)) {
                        stone = m;
                        break;
                    }
                }
                if (stone && stone.player === player) {
                    group.push(stone);
                    
                    const directions = [[0, 1], [0, -1], [1, 0], [-1, 0]];
                    for (const [dx, dy] of directions) {
                        const nc = col + dx;
                        const nr = row + dy;
                        if (nc >= 0 && nc < BOARD_SIZE && nr >= 0 && nr < BOARD_SIZE) {
                            stack.push({col: nc, row: nr});
                        }
                    }
                }
            }
            
            return group;
        }
        
        // 在临时状态中计算气
        function countLibertiesInTemp(group, tempState, tempCaptured) {
            const liberties = new Set();
            const directions = [[0, 1], [0, -1], [1, 0], [-1, 0]];
            
            for (const stone of group) {
                for (const [dx, dy] of directions) {
                    const nc = stone.col + dx;
                    const nr = stone.row + dy;
                    if (nc >= 0 && nc < BOARD_SIZE && nr >= 0 && nr < BOARD_SIZE) {
                        // 从后往前找最新的棋子
                        let occupied = false;
                        for (let i = tempState.length - 1; i >= 0; i--) {
                            const m = tempState[i];
                            if (!m.isPass && m.col === nc && m.row === nr && !tempCaptured.has(`${m.col},${m.row}`)) {
                                occupied = true;
                                break;
                            }
                        }
                        if (!occupied) {
                            liberties.add(`${nc},${nr}`);
                        }
                    }
                }
            }
            return liberties.size;
        }
        
        function undoMove() {
            if (gameState.length === 0) {
                showStatus('没有可悔的棋');
                return;
            }
            
            // 悔棋音效：短促的"啵"声
            playSound('undo');
            
            gameState.pop();
            currentPlayer = currentPlayer === 'B' ? 'W' : 'B';
            
            // 悔棋后清除打劫（状态不确定了）
            koPosition = null;
            
            // 重新计算被提的棋子
            recaptureStones();
            
            updateUI();
            drawStones();
            saveGame();
            
            showStatus('已悔棋');
        }
        
        function clearBoard() {
            if (!confirm('新建棋谱会清空当前棋子，确定新建吗？')) return;
            
            // 清空音效：类似棋子哗啦啦掉落的声音
            playSound('clear');
            
            gameState = [];
            currentPlayer = 'B';
            capturedStones.clear();
            koPosition = null;
            
            updateUI();
            drawStones();
            saveGame();
            
            showStatus('棋盘已清空');
        }
        
        function updateUI() {
            document.getElementById('move-num').textContent = gameState.length;
            const indicator = document.getElementById('player-indicator');
            indicator.className = 'stone-indicator ' + (currentPlayer === 'B' ? 'black' : 'white');
        }
        
        function saveGame() {
            const data = {
                gameState: gameState,
                currentPlayer: currentPlayer,
                captured: Array.from(capturedStones),
                koPosition: koPosition,
                timestamp: new Date().toISOString()
            };
            localStorage.setItem('go-game-save', JSON.stringify(data));
        }

        function loadGame() {
            const saved = localStorage.getItem('go-game-save');
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    gameState = data.gameState || [];
                    currentPlayer = data.currentPlayer || 'B';
                    // 重新计算被提棋子，而不是直接加载（避免残留错误数据）
                    recaptureStones();
                    koPosition = data.koPosition || null;
                    updateUI();
                    drawStones();
                } catch (e) {
                    console.error('加载失败', e);
                }
            }
        }
        
        function generateSGF() {
            const coords = 'abcdefghijklmnopqrstuvwxyz';
            let sgf = '(;GM[1]FF[4]SZ[19]CA[UTF-8]AP[GoRecorder]KM[0]';
            
            for (const move of gameState) {
                if (move.isPass) {
                    sgf += move.player === 'B' ? ';B[]' : ';W[]';
                } else {
                    const coord = coords[move.col] + coords[move.row];
                    sgf += move.player === 'B' ? `;B[${coord}]` : `;W[${coord}]`;
                }
            }
            
            sgf += ')';
            return sgf;
        }
        
        function exportSGF() {
            if (gameState.length === 0) {
                showStatus('棋盘为空');
                return;
            }
            
            const sgf = generateSGF();
            const blob = new Blob([sgf], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            const now = new Date();
            const dateStr = now.getFullYear().toString() +
                           String(now.getMonth() + 1).padStart(2, '0') +
                           String(now.getDate()).padStart(2, '0') + '_' +
                           String(now.getHours()).padStart(2, '0') +
                           String(now.getMinutes()).padStart(2, '0') +
                           String(now.getSeconds()).padStart(2, '0');
            a.download = `棋谱_${dateStr}_${gameState.length}手.sgf`;
            a.click();
            
            URL.revokeObjectURL(url);
            showStatus('SGF已下载');
        }
        
        function copySGF() {
            if (gameState.length === 0) {
                showStatus('棋盘为空');
                return;
            }
            
            const sgf = generateSGF();
            
            // 复制到剪贴板
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(sgf).then(function() {
                    showStatus('SGF已复制到剪贴板');
                }).catch(function(err) {
                    // 降级方案
                    fallbackCopyTextToClipboard(sgf);
                });
            } else {
                // 降级方案
                fallbackCopyTextToClipboard(sgf);
            }
        }
        
        function fallbackCopyTextToClipboard(text) {
            const textArea = document.createElement('textarea');
            textArea.value = text;
            textArea.style.position = 'fixed';
            textArea.style.left = '-9999px';
            textArea.style.top = '0';
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();

            try {
                const successful = document.execCommand('copy');
                if (successful) {
                    showStatus('SGF已复制到剪贴板');
                } else {
                    showStatus('复制失败，请手动复制');
                }
            } catch (err) {
                showStatus('复制失败：' + err);
            }

            document.body.removeChild(textArea);
        }

        function copyDebugInfo() {
            const sgf = generateSGF();
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(sgf).then(function() {
                    showStatus('SGF已复制');
                }).catch(function(err) {
                    fallbackCopyDebugToClipboard(sgf);
                });
            } else {
                fallbackCopyDebugToClipboard(sgf);
            }
        }

        function fallbackCopyDebugToClipboard(text) {
            const textArea = document.createElement('textarea');
            textArea.value = text;
            textArea.style.position = 'fixed';
            textArea.style.left = '-9999px';
            textArea.style.top = '0';
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();

            try {
                const successful = document.execCommand('copy');
                if (successful) {
                    showStatus('SGF已复制');
                } else {
                    showStatus('复制失败');
                }
            } catch (err) {
                showStatus('复制失败：' + err);
            }

            document.body.removeChild(textArea);
        }

        function showStatus(msg) {
            console.log(msg);
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 1500);
        }
        
        canvas.addEventListener('click', placeStone);
        canvas.addEventListener('touchstart', function(e) {
            e.preventDefault();
            placeStone(e);
        }, { passive: false });
        
        document.body.addEventListener('touchmove', function(e) {
            if (e.target === canvas) {
                e.preventDefault();
            }
        }, { passive: false });
        
        init();
    </script>
</body>
</html>
