<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>棋谱列表 | 对手分析</title>
    <link rel="icon" type="image/x-icon" href="/weiqi-page/assets/favicon/favicon.ico">
    <script>document.write('<script src="/weiqi-page/assets/js/auth.js?v=' + Date.now() + '"><\/script>');</script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f5f5;
            color: #333;
            line-height: 1.6;
        }
        .container {
            max-width: 480px;
            margin: 0 auto;
            padding: 12px;
        }
        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: nowrap;
        }
        h1 { font-size: 1.3em; margin: 0; flex-shrink: 0; }
        .header-left { flex-shrink: 0; }
        .header-actions {
            display: flex;
            gap: 10px;
            align-items: center;
            justify-content: flex-end;
        }
        .icon-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1em;
        }
        .icon-btn:hover { background: rgba(255,255,255,0.3); }
        .game-list {
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .game-card {
            background: white;
            border-radius: 10px;
            padding: 14px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .game-card:hover {
            background: #fafafa;
            transform: translateY(-1px);
        }
        .stone-icon { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; display: inline-block; margin-right: 4px; vertical-align: middle; }
        .stone-black { background: radial-gradient(circle at 30% 30%, #666, #000); box-shadow: 1px 1px 3px rgba(0,0,0,0.3); }
        .stone-white { background: radial-gradient(circle at 30% 30%, #fff, #ddd); border: 1px solid #ccc; box-shadow: 1px 1px 3px rgba(0,0,0,0.2); }
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .game-result {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.8em;
            font-weight: 500;
        }
        .result-win { background: #e8f5e9; color: #388e3c; }
        .result-lose { background: #ffebee; color: #c62828; }
        .game-players {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            color: #333;
            font-size: 0.95em;
            margin-bottom: 6px;
        }
        .player-self { color: #667eea; font-weight: 600; }
        .player-vs { color: #999; font-weight: normal; }
        .game-footer {
            font-size: 0.85em;
            color: #888;
        }
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
            background: white;
            border-radius: 8px;
        }
        .loading {
            text-align: center;
            padding: 40px;
        }
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        footer { text-align: center; padding: 15px; color: #999; font-size: 0.8em; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-left">
                <h1>📋 棋谱列表</h1>
            </div>

        </header>
        
        <div id="content">
            <div class="loading">
                <div class="spinner"></div>
                <p>加载中...</p>
            </div>
        </div>
        
        <footer><p>围棋智能助手 &copy; 2026</p></footer>
    </div>
    
    <script>
        let opponentData = null;
        
        // 加载数据
        async function loadData() {
            if (!hasToken()) {
                redirectToAuth();
                return;
            }
            
            try {
                const stored = sessionStorage.getItem('opponent_data');
                if (!stored) {
                    location.href = 'index.html';
                    return;
                }
                
                opponentData = JSON.parse(stored);
                displayGames();
                
            } catch (error) {
                document.getElementById('content').innerHTML = `
                    <div class="empty-state">
                        <p>数据加载失败</p>
                        <button onclick="location.href='index.html'" style="margin-top:12px;padding:8px 16px;background:#667eea;color:white;border:none;border-radius:6px;">返回</button>
                    </div>
                `;
            }
        }
        
        // 显示棋谱列表
        function displayGames() {
            const content = document.getElementById('content');
            
            const games = opponentData.games || [];
            
            if (games.length === 0) {
                content.innerHTML = `
                    <div class="empty-state">
                        <p>未找到棋谱</p>
                        <button onclick="location.href='index.html'" style="margin-top:12px;padding:8px 16px;background:#667eea;color:white;border:none;border-radius:6px;">返回</button>
                    </div>
                `;
                return;
            }
            
            let html = '<div class="game-list">';
            const foxwqId = opponentData.foxwqId;
            
            games.forEach((game, index) => {
                const isBlack = game.black === foxwqId;
                const isWhite = game.white === foxwqId;
                
                // 判断胜负
                const resultText = game.result || '';
                let resultClass = '';
                if (resultText.includes('黑胜')) {
                    resultClass = isBlack ? 'result-win' : 'result-lose';
                } else if (resultText.includes('白胜')) {
                    resultClass = isWhite ? 'result-win' : 'result-lose';
                }
                
                // 组合日期和时间
                const dateTime = game.date + (game.time ? ' ' + game.time : '');
                
                html += `
                    <div class="game-card" data-index="${index}" onclick="viewGameByIndex(${index})">
                        <div class="game-header">
                            <div class="game-players">
                                <span class="${isBlack ? 'player-self' : ''}"><span class="stone-icon stone-black"></span>${game.black || '黑棋'}</span>
                                <span class="player-vs">vs</span>
                                <span class="${isWhite ? 'player-self' : ''}"><span class="stone-icon stone-white"></span>${game.white || '白棋'}</span>
                            </div>
                            ${game.result ? `<span class="game-result ${resultClass}">${game.result}</span>` : ''}
                        </div>
                        <div class="game-footer">
                            ${dateTime}
                        </div>
                    </div>
                `;
            });
            
            html += '</div>';
            content.innerHTML = html;
        }
        
        // 查看棋谱
        function viewGameByIndex(index) {
            const games = opponentData.games || [];
            const game = games[index];
            if (!game) {
                alert('棋谱数据不存在');
                return;
            }
            viewGame(game, 'last');
        }
        
        // 查看棋谱
        async function viewGame(game, gotoMove) {
            const sgf = game.sgf;
            if (!sgf) {
                alert('棋谱数据为空');
                return;
            }
            
            try {
                const response = await fetchWithAuth('/api/replay', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sgf: sgf })
                });
                
                if (!response) return;
                
                const data = await response.json();
                
                if (!data.success || !data.html) {
                    alert('生成打谱页面失败');
                    return;
                }
                
                // 注入跳转脚本
                let gotoScript = '';
                if (gotoMove === 'last') {
                    gotoScript = `<script>(function(){var t=setInterval(function(){if(typeof goToMove==='function'){clearInterval(t);var s=document.getElementById('moveSlider');if(s)goToMove(s.max)}},100)})();<\/script>`;
                } else if (gotoMove && !isNaN(parseInt(gotoMove))) {
                    gotoScript = `<script>(function(){var t=setInterval(function(){if(typeof goToMove==='function'){clearInterval(t);goToMove(${parseInt(gotoMove)})}},100)})();<\/script>`;
                }
                const htmlWithGoto = data.html.replace('</body>', gotoScript + '</body>');
                
                const newWindow = window.open('', '_blank');
                newWindow.document.open();
                newWindow.document.write(htmlWithGoto);
                newWindow.document.close();
                
            } catch (error) {
                alert('加载失败: ' + error.message);
            }
        }
        
        loadData();
    </script>
</body>
</html>
