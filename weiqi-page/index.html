<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>围棋智能助手</title>
    <link rel="icon" type="image/x-icon" href="/assets/favicon/favicon.ico">
    <link rel="icon" type="image/png" sizes="128x128" href="/assets/favicon/favicon.png">
    <link rel="apple-touch-icon" sizes="64x64" href="/assets/favicon/apple-touch-icon.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }
        .container {
            max-width: 400px;
            margin: 0 auto;
            padding: 12px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            text-align: center;
            padding: 12px 10px 8px;
            color: white;
        }
        h1 { 
            font-size: 1.8em; 
            margin-bottom: 4px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        .date-display {
            font-size: 0.75em;
            padding: 2px 10px;
            background: rgba(255,255,255,0.15);
            border-radius: 10px;
            display: inline-block;
        }
        .cards {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-top: 12px;
            flex: 1;
            justify-content: flex-start;
        }
        .card {
            background: white;
            border-radius: 12px;
            padding: 16px 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
        }
        .card-link {
            text-decoration: none;
            color: inherit;
            display: block;
        }
        .card-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
        }
        .card-icon {
            font-size: 1.5em;
            flex-shrink: 0;
        }
        .card h2 {
            color: #333;
            font-size: 1.2em;
            margin: 0;
            font-weight: 600;
        }
        
        /* 统一三列统计区 */
        .triple-stats {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }
        .stat-item {
            flex: 1;
            text-align: center;
            padding: 20px 4px;
            border-radius: 10px;
        }
        .stat-item .emoji { 
            font-size: 1.8em; 
            display: block; 
            margin-bottom: 6px; 
        }
        .stat-item .count { 
            font-size: 2em; 
            font-weight: 700; 
            color: #333; 
            line-height: 1;
            margin: 6px 0;
        }
        .stat-item .name { 
            font-size: 0.8em; 
            color: #666; 
            margin-top: 4px;
        }
        
        /* 棋谱卡片配色 */
        .stat-item.games { background: #e3f2fd; }
        .stat-item.events { background: #f3e5f5; }
        .stat-item.sources { background: #e8f5e9; }
        
        /* 选点卡片配色 */
        .stat-item.layout { background: #e3f2fd; }
        .stat-item.middle { background: #e8f5e9; }
        .stat-item.endgame { background: #fff3e0; }
        
        /* 难度小标签 */
        .difficulty-row {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-bottom: 0;
            font-size: 0.85em;
        }
        .diff-tag {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .diff-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }
        .dot-easy { background: #4caf50; }
        .dot-medium { background: #ff9800; }
        .dot-hard { background: #f44336; }
        
        /* 定式卡片配色 */
        .stat-item.hot { background: #ffebee; }
        .stat-item.hit { background: #e8f5e9; }
        .stat-item.complex { background: #e3f2fd; }
        
        
        footer {
            text-align: center;
            padding: 10px;
            color: rgba(255,255,255,0.7);
            font-size: 0.7em;
            margin-top: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>围棋智能助手</h1>
            <div class="date-display">2026-04-21</div>
        </header>
        
        <div class="cards">
            <!-- 棋谱卡片 -->
            <a href="/weiqi-page/games/" class="card-link">
                <div class="card">
                    <div class="card-header">
                        <div class="card-icon">📥</div>
                        <h2>实战棋谱</h2>
                    </div>
                    <div class="triple-stats">
                        <div class="stat-item games">
                            <span class="emoji">📋</span>
                            <span class="count">7</span>
                            <span class="name">最近新增</span>
                        </div>
                        <div class="stat-item events">
                            <span class="emoji">🏆</span>
                            <span class="count">4</span>
                            <span class="name">个赛事</span>
                        </div>
                        <div class="stat-item sources">
                            <span class="emoji">🌐</span>
                            <span class="count">1</span>
                            <span class="name">个来源</span>
                        </div>
                    </div>
                </div>
            </a>
            
            <!-- 选点题卡片 -->
            <a href="/weiqi-page/quiz/" class="card-link">
                <div class="card">
                    <div class="card-header">
                        <div class="card-icon">🎯</div>
                        <h2>实战选点</h2>
                    </div>
                    <div class="triple-stats">
                        <div class="stat-item layout">
                            <span class="emoji">🌅</span>
                            <span class="count">0</span>
                            <span class="name">布局</span>
                        </div>
                        <div class="stat-item middle">
                            <span class="emoji">⚔️</span>
                            <span class="count">7</span>
                            <span class="name">中盘</span>
                        </div>
                        <div class="stat-item endgame">
                            <span class="emoji">🔚</span>
                            <span class="count">1</span>
                            <span class="name">官子</span>
                        </div>
                    </div>
                    <div class="difficulty-row">
                        <span class="diff-tag">
                            <span class="diff-dot dot-easy"></span>
                            简单5
                        </span>
                        <span class="diff-tag">
                            <span class="diff-dot dot-medium"></span>
                            中等2
                        </span>
                        <span class="diff-tag">
                            <span class="diff-dot dot-hard"></span>
                            困难1
                        </span>
                    </div>
                </div>
            </a>
            
            <!-- 定式卡片 -->
            <a href="/weiqi-page/joseki/" class="card-link">
                <div class="card">
                    <div class="card-header">
                        <div class="card-icon">📚</div>
                        <h2>定式发现</h2>
                    </div>
                    <div class="triple-stats">
                        <div class="stat-item hot">
                            <span class="emoji">🔥</span>
                            <span class="count">3</span>
                            <span class="name">热门</span>
                        </div>
                        <div class="stat-item hit">
                            <span class="emoji">🎯</span>
                            <span class="count">1</span>
                            <span class="name">命中</span>
                        </div>
                        <div class="stat-item complex">
                            <span class="emoji">🧩</span>
                            <span class="count">7</span>
                            <span class="name">复杂</span>
                        </div>
                    </div>
                </div>
            </a>
        </div>
        
        <footer>
            <p>围棋智能助手 &copy; 2026 | AI驱动 · 每日更新</p>
        </footer>
    </div>
    </body>
</html>
