                        if (data.elementId) {
                            const el = document.querySelector('[data-joseki-id="' + data.elementId + '"]');
                            if (el) el.scrollIntoView({ block: 'start', behavior: 'instant' });
                        }
                    }, 200);
                };
                requestAnimationFrame(function() { setTimeout(tryScroll, 50); });
            } catch (e) { localStorage.removeItem(getScrollKey()); }
        }
        function getVisited() {
            try { const data = localStorage.getItem(getStorageKey()); if (!data) return []; const parsed = JSON.parse(data); return Array.isArray(parsed) ? parsed : []; } catch (e) { return []; }
        }
        function clearVisited() {
            localStorage.removeItem(getStorageKey());
            document.querySelectorAll('.joseki-card').forEach(card => { card.style.opacity = '1'; });
        }
        function bindVisitEvents() {
            const visited = getVisited();
            document.querySelectorAll('.joseki-card-link').forEach(item => {
                const josekiId = item.dataset.josekiId;
                if (visited.includes(josekiId)) { item.querySelector('.joseki-card').style.opacity = '0.6'; }
                item.addEventListener('click', function() {
                    saveScrollPosition(josekiId);
                    let visited = getVisited();
                    if (!visited.includes(josekiId)) { visited.push(josekiId); localStorage.setItem(getStorageKey(), JSON.stringify(visited)); }
                    this.querySelector('.joseki-card').style.opacity = '0.6';
                }, { once: true });
            });
        }
        document.addEventListener('DOMContentLoaded', function() {
             applyPreset('2026-04-17', 'hot');  applyPreset('2026-04-18', 'hot');  applyPreset('2026-04-16', 'hot');  applyPreset('2026-04-19', 'hot');  applyPreset('2026-04-15', 'hot'); 
        });
        window.addEventListener('pageshow', function(event) { if (event.persisted) { hasRestoredScroll = false; restoreScrollPosition(); } });
        document.addEventListener('visibilitychange', function() { if (document.visibilityState === 'hidden') saveScrollPosition(); });
        window.addEventListener('beforeunload', saveScrollPosition);
        window.addEventListener('pagehide', saveScrollPosition);
    </script>
</body>
</html>
