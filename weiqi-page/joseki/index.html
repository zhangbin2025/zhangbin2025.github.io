        // 计算匹配度
        function calcMatchRate(joseki) {
            return joseki.move_count > 0 ? joseki.matched_prefix_len / joseki.move_count : 0;
        }
        
        // 计算各类标签的数量
        function calcStats(josekiList) {
            const total = josekiList.length;
            let hot = 0, hit = 0, complex = 0;
            
            // 筛选匹配>=8手的定式，用于热门计算
            const candidates8 = josekiList.filter(j => j.matched_prefix_len >= 8);
            // 按库出现次数降序，次数相同按匹配度降序
            const sortedByFreq = [...candidates8].sort((a, b) => {
                const freqDiff = (b.frequency || 0) - (a.frequency || 0);
                if (freqDiff !== 0) return freqDiff;
                return calcMatchRate(b) - calcMatchRate(a);
            });
            const top3Hot = new Set(sortedByFreq.slice(0, 3).map(j => j.joseki_id || j.moves.join(',')));
            
            josekiList.forEach(j => {
                const rate = calcMatchRate(j);
                const key = j.joseki_id || j.moves.join(',');
                
                // 热门: 前缀>=8 + 在库出现次数前3名（次数相同按匹配度排）
                if (j.matched_prefix_len >= 8 && top3Hot.has(key)) hot++;
                
                // 命中: 前缀>=8 + 匹配度100%
                if (j.matched_prefix_len >= 8 && rate >= 1) hit++;
                
                // 复杂: 前缀>=12
                if (j.matched_prefix_len >= 12) complex++;
            });
            
            return { total, hot, hit, complex };
        }

                tab.classList.remove('active');
            });
            document.getElementById(`tab-${date}-${preset}`).classList.add('active');
            
            // 筛选逻辑
            let filtered = [...s.allJoseki];
            
            // 计算热门排名：匹配>=8手的定式，按库出现次数降序，次数相同按匹配度降序
            const candidates8 = [...s.allJoseki].filter(j => j.matched_prefix_len >= 8);
            const sortedByFreq = [...candidates8].sort((a, b) => {
                const freqDiff = (b.frequency || 0) - (a.frequency || 0);
                if (freqDiff !== 0) return freqDiff;
                return calcMatchRate(b) - calcMatchRate(a);
            });
            const top3Hot = new Set(sortedByFreq.slice(0, 3).map(j => j.joseki_id || j.moves.join(',')));
            
            if (preset === 'hot') {
                // 热门: 前缀>=8 + 库出现次数前3名
                filtered = filtered.filter(j => {
                    const key = j.joseki_id || j.moves.join(',');
                    return j.matched_prefix_len >= 8 && top3Hot.has(key);
                });
                // 热门按匹配度降序
                s.sortBy = 'match_rate';
                s.sortDesc = true;
            } else if (preset === 'hit') {
                // 命中: 前缀>=8 + 匹配度100%
                filtered = filtered.filter(j => {
                    return j.matched_prefix_len >= 8 && calcMatchRate(j) >= 1;
                });
            } else if (preset === 'complex') {
                // 复杂: 前缀>=12，按匹配长度降序
                filtered = filtered.filter(j => j.matched_prefix_len >= 12);
                s.sortBy = 'prefix_len';
                s.sortDesc = true;
            }
            // all 不过滤
            
            s.filteredJoseki = filtered;
            renderJoseki(date);
        }
        
        // 渲染定式列表

            let list = s.filteredJoseki.length > 0 || s.currentFilter !== 'all'

                : [...s.allJoseki];
            
            // 排序
            if (s.currentFilter === 'all') {
                // "全部" 按匹配前缀手数降序
                list.sort((a, b) => {
                    return b.matched_prefix_len - a.matched_prefix_len;
                });
            } else {
                // 其他标签使用原来的排序逻辑
                list.sort((a, b) => {
                    let valA, valB;
                    switch (s.sortBy) {
                        case 'match_rate':
                            valA = calcMatchRate(a);
                            valB = calcMatchRate(b);
                            break;
                        case 'prefix_len':
                            valA = a.matched_prefix_len;
                            valB = b.matched_prefix_len;
                            break;
                        case 'library_freq':
                            valA = a.frequency || 0;
                            valB = b.frequency || 0;
                            break;
                        case 'move_count':
                            valA = a.move_count;
                            valB = b.move_count;
                            break;
                        case 'frequency':
                            valA = a.frequency;
                            valB = b.frequency;
                            break;
                        default:
                            valA = calcMatchRate(a);

            try {
                const data = localStorage.getItem(getStorageKey());
                if (!data) return [];
                const parsed = JSON.parse(data);
                return Array.isArray(parsed) ? parsed : [];
            } catch (e) {
                return [];
            }
        }
        
        function clearVisited() {
            localStorage.removeItem(getStorageKey());
            // 重置所有卡片的样式
            document.querySelectorAll('.joseki-card').forEach(card => {
                card.style.opacity = '1';
            });
        }
        
        function bindVisitEvents() {
            const visited = getVisited();
            
            document.querySelectorAll('.joseki-card-link').forEach(item => {
                const josekiId = item.dataset.josekiId;
                
                // 恢复已访问样式
                if (visited.includes(josekiId)) {
                    item.querySelector('.joseki-card').style.opacity = '0.6';
                }
                
                // 绑定点击事件（使用 once: true 防止重复绑定）
                item.addEventListener('click', function() {
                    const key = getStorageKey();
                    let visited = getVisited();
                    if (!visited.includes(josekiId)) {
                        visited.push(josekiId);
                        localStorage.setItem(key, JSON.stringify(visited));
                    }
                    // 立即应用已访问样式
                    this.querySelector('.joseki-card').style.opacity = '0.6';
                }, { once: true });
            });
        }
        
        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 初始化每个日期的显示
            
            applyPreset('2026-04-17', 'hot');
            
            applyPreset('2026-04-16', 'hot');
            
            applyPreset('2026-04-15', 'hot');
            
        });
    </script>
</body>
</html>
