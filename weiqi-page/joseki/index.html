        }
        .container {

            margin: 0 auto;
            padding: 12px;
        }

            justify-content: space-between;
            align-items: center;
            flex-wrap: nowrap;
        }

            align-items: center;
            justify-content: flex-end;
        }
        .icon-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1em;
        }
        .icon-btn:hover { background: rgba(255,255,255,0.3); }
        .header-actions select {
            padding: 6px 10px;
            border: none;
            border-radius: 5px;
            font-size: 0.85em;
        }
        @media (max-width: 600px) {
            header { padding: 12px; }
            .header-actions select { font-size: 0.8em; padding: 4px 6px; }
            .icon-btn { width: 28px; height: 28px; font-size: 0.9em; }
        }
        
        /* 筛选标签栏 - 圆角胶囊风格，小屏幕适配 */
        .filter-tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 12px;
            padding-bottom: 4px;
            flex-wrap: nowrap;
        }
        .filter-tab {
            flex-shrink: 0;
            padding: 5px 8px;
            border-radius: 12px;
            font-size: 0.8em;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid #e0e0e0;
            background: white;
            color: #666;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 2px;
            white-space: nowrap;
        }
        .filter-tab:hover {
            background: #f8f9fa;
            border-color: #ccc;
        }
        .filter-tab.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        .filter-tab .count {
            font-size: 0.85em;
            padding: 1px 6px;
            background: rgba(0,0,0,0.1);
            border-radius: 10px;
        }
        .filter-tab.active .count {
            background: rgba(255,255,255,0.3);
        }
        
        /* 统计信息 - 简洁版 */
        .stats-bar {
            background: white;
            padding: 10px 15px;
            border-radius: 8px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            font-size: 0.9em;
            color: #666;
        }
        .stats-bar .highlight {
            color: #667eea;
            font-weight: 600;
        }

        .date-content {
            display: none;
        }
        .date-content.active {
            display: block;
        }
        .joseki-list {
            padding: 0;
        }
        .joseki-item-link {

            border-bottom: 1px solid #f5f5f5;
            text-decoration: none;
            color: inherit;
            transition: background 0.2s;
        }
        .joseki-item-link:last-child { border-bottom: none; }
        .joseki-item-link:hover { background: #fafafa; }
        .joseki-item-link:visited { opacity: 0.6; }
        .joseki-item {
            padding: 12px 15px;
        }
        .joseki-content {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .joseki-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }
        .joseki-title {
            font-weight: 500;
            color: #333;
            font-size: 1em;
        }
        .joseki-title-row {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 0.95em;
            white-space: nowrap;
        }
        .joseki-moves {
            font-size: 0.85em;
            color: #667eea;
            font-weight: 500;
            padding: 2px 6px;
            background: #f0f0ff;
            border-radius: 8px;
            flex-shrink: 0;
        }
        .joseki-players {
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 500;
        }
        .stone-icon {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .stone-black {
            background: radial-gradient(circle at 30% 30%, #666, #000);
            box-shadow: 1px 1px 3px rgba(0,0,0,0.3);
        }
        .stone-white {
            background: radial-gradient(circle at 30% 30%, #fff, #ddd);
            border: 1px solid #ccc;
            box-shadow: 1px 1px 3px rgba(0,0,0,0.2);
        }
        .joseki-vs {
            color: #999;
            font-weight: normal;
            font-size: 0.9em;
        }
        .joseki-meta {
            font-size: 0.85em;
            color: #888;

        .joseki-tag {

            background: #e8f5e9;
            color: #2e7d32;
            border-radius: 10px;
            font-size: 0.8em;

        .joseki-tag.new {
            background: #e3f2fd;
            color: #1976d2;
        }
        .joseki-tag.complex {
            background: #e3f2fd;
            color: #1565c0;
        }
        .joseki-tag.common {
            background: #e8f5e9;
            color: #2e7d32;

            color: #888;
            background: #f5f5f5;
            padding: 2px 6px;
            border-radius: 4px;

            color: #e65100;
            border-radius: 10px;
            font-size: 0.85em;
            font-weight: 500;
            flex-shrink: 0;

            font-size: 0.85em;
            white-space: nowrap;
            flex-shrink: 0;

        .game-btn:hover {
            background: #c8e6c9;

            display: flex;
            flex-direction: column;
            gap: 12px;

            margin-bottom: 10px;

        .metric {

            text-align: center;

        .metric-value {

            font-weight: 600;
            color: #667eea;
        }
        .metric-label {
            font-size: 0.8em;
            color: #888;
            margin-top: 2px;

            background: #fafafa;
            border-top: 1px solid #f5f5f5;
            display: flex;
            justify-content: space-between;
            align-items: center;

            padding: 40px;

        function calcMatchRate(joseki) {
            return joseki.move_count > 0 ? joseki.matched_prefix_len / joseki.move_count : 0;
        }
        
        // 计算各类标签的数量
        function calcStats(josekiList) {
            const total = josekiList.length;
            let hot = 0, hit = 0, complex = 0;
            
            // 筛选匹配>=8手的定式，用于热门计算
            const candidates8 = josekiList.filter(j => j.matched_prefix_len >= 8);
            // 按库出现次数降序，次数相同按匹配度降序
            const sortedByFreq = [...candidates8].sort((a, b) => {
                const freqDiff = (b.frequency || 0) - (a.frequency || 0);
                if (freqDiff !== 0) return freqDiff;
                return calcMatchRate(b) - calcMatchRate(a);
            });
            const top3Hot = new Set(sortedByFreq.slice(0, 3).map(j => j.joseki_id || j.moves.join(',')));
            
            josekiList.forEach(j => {
                const rate = calcMatchRate(j);
                const key = j.joseki_id || j.moves.join(',');
                
                // 热门: 前缀>=8 + 在库出现次数前3名（次数相同按匹配度排）
                if (j.matched_prefix_len >= 8 && top3Hot.has(key)) hot++;
                
                // 命中: 前缀>=8 + 匹配度100%
                if (j.matched_prefix_len >= 8 && rate >= 1) hit++;
                
                // 复杂: 前缀>=12
                if (j.matched_prefix_len >= 12) complex++;
            });
            
            return { total, hot, hit, complex };
        }
        
        // 应用预设筛选
        function applyPreset(date, preset) {
            const s = state[date];
            s.currentFilter = preset;
            
            // 更新标签样式
            document.querySelectorAll(`[id^="tab-${date}-"]`).forEach(tab => {
                tab.classList.remove('active');
            });
            document.getElementById(`tab-${date}-${preset}`).classList.add('active');
            
            // 筛选逻辑
            let filtered = [...s.allJoseki];
            
            // 计算热门排名：匹配>=8手的定式，按库出现次数降序，次数相同按匹配度降序
            const candidates8 = [...s.allJoseki].filter(j => j.matched_prefix_len >= 8);
            const sortedByFreq = [...candidates8].sort((a, b) => {
                const freqDiff = (b.frequency || 0) - (a.frequency || 0);
                if (freqDiff !== 0) return freqDiff;
                return calcMatchRate(b) - calcMatchRate(a);
            });
            const top3Hot = new Set(sortedByFreq.slice(0, 3).map(j => j.joseki_id || j.moves.join(',')));
            
            if (preset === 'hot') {
                // 热门: 前缀>=8 + 库出现次数前3名
                filtered = filtered.filter(j => {
                    const key = j.joseki_id || j.moves.join(',');
                    return j.matched_prefix_len >= 8 && top3Hot.has(key);
                });
                // 热门按匹配度降序
                s.sortBy = 'match_rate';
                s.sortDesc = true;
            } else if (preset === 'hit') {
                // 命中: 前缀>=8 + 匹配度100%
                filtered = filtered.filter(j => {
                    return j.matched_prefix_len >= 8 && calcMatchRate(j) >= 1;
                });
            } else if (preset === 'complex') {
                // 复杂: 前缀>=12，按匹配长度降序
                filtered = filtered.filter(j => j.matched_prefix_len >= 12);
                s.sortBy = 'prefix_len';
                s.sortDesc = true;
            }
            // all 不过滤
            
            s.filteredJoseki = filtered;
            renderJoseki(date);
        }
        
        // 渲染定式列表
        function renderJoseki(date) {
            const s = state[date];
            let list = s.filteredJoseki.length > 0 || s.currentFilter !== 'all' 
                ? s.filteredJoseki 
                : [...s.allJoseki];
            
            // 排序
            if (s.currentFilter === 'all') {
                // "全部" 按匹配前缀手数降序
                list.sort((a, b) => {
                    return b.matched_prefix_len - a.matched_prefix_len;
                });
            } else {
                // 其他标签使用原来的排序逻辑
                list.sort((a, b) => {
                    let valA, valB;
                    switch (s.sortBy) {
                        case 'match_rate':
                            valA = calcMatchRate(a);
                            valB = calcMatchRate(b);
                            break;
                        case 'prefix_len':
                            valA = a.matched_prefix_len;
                            valB = b.matched_prefix_len;
                            break;
                        case 'library_freq':
                            valA = a.frequency || 0;
                            valB = b.frequency || 0;
                            break;
                        case 'move_count':
                            valA = a.move_count;
                            valB = b.move_count;
                            break;
                        case 'frequency':
                            valA = a.frequency;
                            valB = b.frequency;
                            break;
                        default:
                            valA = calcMatchRate(a);
                            valB = calcMatchRate(b);
                    }
                    return s.sortDesc ? valB - valA : valA - valB;
                });
            }
            
            // 更新统计
            const stats = calcStats(s.allJoseki);
            document.getElementById(`stats-total-${date}`).textContent = list.length;
            document.getElementById(`count-${date}-all`).textContent = stats.total;
            document.getElementById(`count-${date}-hot`).textContent = stats.hot;
            document.getElementById(`count-${date}-hit`).textContent = stats.hit;
            document.getElementById(`count-${date}-complex`).textContent = stats.complex;
            
            // 渲染列表
            const container = document.getElementById(`list-${date}`);
            if (list.length === 0) {
                container.innerHTML = '<div class="empty-state">暂无符合条件的定式</div>';
                return;
            }
            
            // 计算热门排名：匹配>=8手，按库出现次数降序，次数相同按匹配度降序
            const candidates8 = [...s.allJoseki].filter(j => j.matched_prefix_len >= 8);
            const sortedByFreq = [...candidates8].sort((a, b) => {
                const freqDiff = (b.frequency || 0) - (a.frequency || 0);
                if (freqDiff !== 0) return freqDiff;
                return calcMatchRate(b) - calcMatchRate(a);
            });
            const top3Hot = new Set(sortedByFreq.slice(0, 3).map(j => j.joseki_id || j.moves.join(',')));
            
            container.innerHTML = list.map(joseki => {
                const matchRate = calcMatchRate(joseki);
                const key = joseki.joseki_id || joseki.moves.join(',');
                
                // 确定标签
                let tags = [];
                // 热门：前缀>=8 + 库出现次数前3名
                if (joseki.matched_prefix_len >= 8 && top3Hot.has(key)) {
                    tags.push('<span class="tag tag-hot">🔥 热门</span>');
                }
                // 命中：前缀>=8 + 匹配度100%
                if (joseki.matched_prefix_len >= 8 && matchRate >= 1) {
                    tags.push('<span class="tag tag-hit">🎯 命中</span>');
                }
                // 复杂：前缀>=12
                if (joseki.matched_prefix_len >= 12) {
                    tags.push('<span class="tag tag-complex">🧩 复杂</span>');
                }
                
                return `
                    <a href="${joseki.path}" class="joseki-card-link" data-joseki-id="${joseki.id || joseki.path}">
                        <div class="joseki-card">
                            <div class="joseki-header">
                                <div class="joseki-players">
                                    <span class="stone-icon stone-black"></span>
                                    ${joseki.black}
                                    <span class="joseki-vs">vs</span>
                                    <span class="stone-icon stone-white"></span>
                                    ${joseki.white}
                                </div>
                            </div>
                            <div class="joseki-tags-row">
                                ${tags.join('')}
                            </div>
                            <div class="joseki-body">
                                <div class="metrics-row">
                                    <div class="metric">
                                        <div class="metric-value">${joseki.matched_prefix_len}/${joseki.move_count}</div>
                                        <div class="metric-label">匹配/总手数</div>
                                    </div>
                                    <div class="metric">
                                        <div class="metric-value">${joseki.frequency || 0}</div>
                                        <div class="metric-label">库出现次数</div>
                                    </div>
                                    <div class="metric">
                                        <div class="metric-value">${(joseki.probability * 100).toFixed(1)}%</div>
                                        <div class="metric-label">库出现概率</div>
                                    </div>
                                </div>
                            </div>
                            <div class="joseki-footer">
                                <div class="joseki-meta">${joseki.event || ''}</div>
                                ${joseki.game_path ? `<button class="game-btn" data-game-path="${joseki.game_path}" onclick="openGame(event, this);">📖 棋谱</button>` : ''}
                            </div>
                        </div>
                    </a>
                `;
            }).join('');
            
            // 重新绑定访问记录事件
            bindVisitEvents();
        }
        
        // 按日期筛选
        function filterByDate() {
            const selectedDate = document.getElementById('dateFilter').value;
            currentDate = selectedDate;
            
            // 隐藏所有日期内容
            document.querySelectorAll('.date-content').forEach(content => {
                content.classList.remove('active');
            });
            
            // 显示选中的日期内容
            const selectedContent = document.querySelector('.date-content[data-date="' + selectedDate + '"]');
            if (selectedContent) {
                selectedContent.classList.add('active');
                // 渲染该日期的定式（渲染时会自动恢复访问记录）
                renderJoseki(selectedDate);
            }
        }
        
        function openGame(event, element) {
            event.preventDefault();
            event.stopPropagation();
            window.location.href = element.dataset.gamePath;
        }
        
        function getStorageKey() {
            return 'visited_joseki_' + currentDate;
        }
        
        function getVisited() {
            try {
                const data = localStorage.getItem(getStorageKey());
                if (!data) return [];
                const parsed = JSON.parse(data);
                return Array.isArray(parsed) ? parsed : [];
            } catch (e) {
                return [];
            }
        }
        
        function clearVisited() {
            localStorage.removeItem(getStorageKey());
            // 重置所有卡片的样式
            document.querySelectorAll('.joseki-card').forEach(card => {
                card.style.opacity = '1';
            });
        }
        
        function bindVisitEvents() {
            const visited = getVisited();
            
            document.querySelectorAll('.joseki-card-link').forEach(item => {
                const josekiId = item.dataset.josekiId;
                
                // 恢复已访问样式
                if (visited.includes(josekiId)) {
                    item.querySelector('.joseki-card').style.opacity = '0.6';
                }
                
                // 绑定点击事件（使用 once: true 防止重复绑定）
                item.addEventListener('click', function() {
                    const key = getStorageKey();
                    let visited = getVisited();
                    if (!visited.includes(josekiId)) {
                        visited.push(josekiId);
                        localStorage.setItem(key, JSON.stringify(visited));
                    }
                    // 立即应用已访问样式
                    this.querySelector('.joseki-card').style.opacity = '0.6';
                }, { once: true });
            });
        }
        
        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 初始化每个日期的显示
            
            applyPreset('2026-04-15', 'hot');
            
        });
    </script>
</body>
</html>
