<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Token 认证 - 围棋智能助手</title>
    <link rel="icon" type="image/x-icon" href="/weiqi-page/assets/favicon/favicon.ico">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .auth-card {
            background: white;
            border-radius: 16px;
            padding: 32px 24px;
            width: 100%;
            max-width: 360px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        
        .auth-icon {
            font-size: 48px;
            text-align: center;
            margin-bottom: 16px;
        }
        
        h1 {
            text-align: center;
            font-size: 1.5em;
            margin-bottom: 8px;
            color: #333;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 24px;
            font-size: 0.9em;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-size: 0.9em;
        }
        
        input[type="text"] {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }
        
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        
        button:hover {
            opacity: 0.9;
        }
        
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .divider {
            height: 1px;
            background: #e0e0e0;
            margin: 24px 0;
        }
        
        .help-text {
            text-align: center;
            color: #888;
            font-size: 0.85em;
            line-height: 1.6;
        }
        
        .help-text strong {
            color: #555;
        }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="auth-icon">🔐</div>
        <h1>Token 认证</h1>
        <p class="subtitle">您访问的页面需要有效的 Token</p>
        
        <form id="authForm">
            <div class="form-group">
                <label for="tokenInput">请输入 Token</label>
                <input type="text" id="tokenInput" placeholder="粘贴您的 Token..." required>
            </div>
            
            <button type="submit" id="submitBtn">💾 保存并返回</button>
        </form>
        
        <div class="divider"></div>
        
        <div class="help-text">
            <p><strong>还没有 Token？</strong></p>
            <p>请联系管理员申请<br>Token 有效期通常为 24 小时</p>
        </div>
    </div>
    
    <script>
        // 获取返回地址
        const urlParams = new URLSearchParams(window.location.search);
        const returnUrl = urlParams.get('return') || '/';
        
        // 表单提交
        document.getElementById('authForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const token = document.getElementById('tokenInput').value.trim();
            const submitBtn = document.getElementById('submitBtn');
            
            if (!token) {
                alert('请输入 Token');
                return;
            }
            
            // 禁用按钮防止重复提交
            submitBtn.disabled = true;
            submitBtn.textContent = '保存中...';
            
            // 保存到 localStorage
            localStorage.setItem('weiqi_token', token);
            
            // 返回原页面
            window.location.href = decodeURIComponent(returnUrl);
        });
        
        // 页面加载时，如果已有 Token，自动填充
        window.onload = function() {
            const existingToken = localStorage.getItem('weiqi_token');
            if (existingToken) {
                document.getElementById('tokenInput').value = existingToken;
            }
        };
    </script>
</body>
</html>
